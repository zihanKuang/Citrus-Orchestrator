name: Citrus CI - Quality Guard

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Run Helm Lint
        run: |
          helm lint deploy/helm/citrus-app

      - name: Helm Template (Dry Run)
        run: |
          helm template deploy/helm/citrus-app

  build-recommendation:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase Repo Owner
        id: repo
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Checkout for changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            recommendation:
              - 'src/recommendationservice/**'
            shoppingassistant:
              - 'src/shoppingassistantservice/**'
      
      - name: Log in to GHCR
        if: steps.filter.outputs.recommendation == 'true'
        uses: docker/login-action@v3
        with: 
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Build and Push Image
        if: steps.filter.outputs.recommendation == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./src/recommendationservice
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/citrus-recommendation:latest
            ghcr.io/${{ steps.repo.outputs.owner }}/citrus-recommendation:${{ github.sha }}

      - name: Log in to GHCR (ShoppingAssistant)
        if: steps.filter.outputs.shoppingassistant == 'true'
        uses: docker/login-action@v3
        with: 
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Build and Push ShoppingAssistant
        if: steps.filter.outputs.shoppingassistant == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./src/shoppingassistantservice 
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/citrus-shoppingassistant:latest
            ghcr.io/${{ steps.repo.outputs.owner }}/citrus-shoppingassistant:${{ github.sha }}