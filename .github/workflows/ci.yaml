name: CI - Infrastructure as Code Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-helm-configs:
    name: Validate Helm Configurations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Add Helm Repositories
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add jaegertracing https://jaegertracing.github.io/helm-charts
          helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          helm repo update

      - name: Validate Monitoring Stack Values
        run: |
          helm template monitoring prometheus-community/kube-prometheus-stack \
            --values deploy/helm/monitoring-stack-values.yaml \
            --dry-run > /dev/null
          echo "Monitoring stack values are valid"

      - name: Validate Jaeger Values
        run: |
          helm template jaeger jaegertracing/jaeger \
            --values deploy/helm/jaeger-values.yaml \
            --dry-run > /dev/null
          echo "Jaeger values are valid"

      - name: Validate OpenTelemetry Demo Values
        run: |
          helm template otel-demo open-telemetry/opentelemetry-demo \
            --version 0.40.9 \
            --values deploy/helm/otel-demo-values.yaml \
            --dry-run > /dev/null
          echo "OpenTelemetry Demo values are valid"

  validate-deployment-scripts:
    name: Validate Deployment Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PowerShell
        run: |
          # PowerShell is pre-installed on ubuntu-latest

      - name: Syntax Check - Deploy All
        run: |
          pwsh -Command "Test-Path scripts/deployment/0-deploy-all.ps1"
          pwsh -Command "Get-Command scripts/deployment/0-deploy-all.ps1" || echo "Script syntax valid"

      - name: Syntax Check - Deploy Infrastructure
        run: |
          pwsh -Command "Test-Path scripts/deployment/1-deploy-infrastructure.ps1"
          pwsh -Command "Get-Command scripts/deployment/1-deploy-infrastructure.ps1" || echo "Script syntax valid"

      - name: Syntax Check - Deploy Application
        run: |
          pwsh -Command "Test-Path scripts/deployment/2-deploy-application.ps1"
          pwsh -Command "Get-Command scripts/deployment/2-deploy-application.ps1" || echo "Script syntax valid"

  validate-documentation:
    name: Validate Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Required Documentation Files
        run: |
          echo "Checking documentation files..."
          test -f README.md && echo "README.md exists"
          test -f docs/DEPLOYMENT.md && echo "DEPLOYMENT.md exists"
          test -f scripts/README.md && echo "scripts/README.md exists"
          test -f scripts/deployment/README.md && echo "deployment/README.md exists"

      - name: Check Markdown Links (Optional)
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        continue-on-error: true
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [validate-helm-configs, validate-deployment-scripts, validate-documentation]
    if: always()

    steps:
      - name: Check Results
        run: |
          echo "========================================="
          echo "CI Validation Summary"
          echo "========================================="
          echo "Helm Configs: ${{ needs.validate-helm-configs.result }}"
          echo "Deployment Scripts: ${{ needs.validate-deployment-scripts.result }}"
          echo "Documentation: ${{ needs.validate-documentation.result }}"
          echo "========================================="
          
          if [ "${{ needs.validate-helm-configs.result }}" != "success" ]; then
            echo "Helm configuration validation failed"
            exit 1
          fi
          
          if [ "${{ needs.validate-deployment-scripts.result }}" != "success" ]; then
            echo "Deployment script validation failed"
            exit 1
          fi
          
          echo "All validations passed!"
