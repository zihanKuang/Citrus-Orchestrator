name: Citrus CI - Quality Guard

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Run Helm Lint
        run: |
          helm lint deploy/helm/citrus-app

      - name: Helm Template (Dry Run)
        run: |
          helm template deploy/helm/citrus-app