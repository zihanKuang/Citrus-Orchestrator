name: Citrus CI/CD - Full Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    name: Helm Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Run Helm Lint
        run: |
          helm lint deploy/helm/citrus-app

      - name: Helm Template (Dry Run)
        run: |
          helm template citrus deploy/helm/citrus-app --debug

  # Path-based filtering for smart builds
  detect-changes:
    name: Detect Service Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      cartservice: ${{ steps.filter.outputs.cartservice }}
      recommendation: ${{ steps.filter.outputs.recommendation }}
      shoppingassistant: ${{ steps.filter.outputs.shoppingassistant }}
      productcatalog: ${{ steps.filter.outputs.productcatalog }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'src/frontend/**'
            cartservice:
              - 'src/cartservice/**'
            recommendation:
              - 'src/recommendationservice/**'
            shoppingassistant:
              - 'src/shoppingassistantservice/**'
            productcatalog:
              - 'src/productcatalogservice/**'

  # Build Frontend (Go)
  build-frontend:
    name: Build Frontend Service
    runs-on: ubuntu-latest
    needs: [lint-and-test, detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase Repo Owner
        id: repo
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with: 
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha  # GitHub Actions cache
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/citrus-frontend:latest
            ghcr.io/${{ steps.repo.outputs.owner }}/citrus-frontend:${{ github.sha }}

  # Build Cart Service (C#)
  build-cartservice:
    name: Build Cart Service
    runs-on: ubuntu-latest
    needs: [lint-and-test, detect-changes]
    if: needs.detect-changes.outputs.cartservice == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase Repo Owner
        id: repo
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with: 
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push CartService
        uses: docker/build-push-action@v5
        with:
          context: ./src/cartservice/src
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/citrus-cart:latest
            ghcr.io/${{ steps.repo.outputs.owner }}/citrus-cart:${{ github.sha }}