# =============================================================================
# RBAC Configuration for MCP Server
# =============================================================================
# Least-privilege security model:
# - Read-only permissions (get, list, watch)
# - Namespace-scoped (citrus only)
# - No destructive operations (delete, create, update)
#
# Components:
# 1. ServiceAccount: Pod identity (auto-injected JWT token)
# 2. Role: Permission rules (what operations allowed)
# 3. RoleBinding: Links ServiceAccount to Role
# =============================================================================

# ServiceAccount: Pod identity for Kubernetes API access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-server-sa
  namespace: citrus
  labels:
    app: mcp-server

---
# Role: Permission definitions
# - Namespace-scoped (citrus only)
# - Read-only verbs: get, list, watch
# - Explicitly excludes: create, update, patch, delete
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mcp-server-readonly
  namespace: citrus
  labels:
    app: mcp-server
rules:
  # Pod inspection: status, logs
  # Allows: kubectl get/logs pods
  # Blocks: kubectl exec/delete/port-forward
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
    verbs:
      - get
      - list
      - watch

  # Event inspection for troubleshooting
  - apiGroups: [""]
    resources:
      - events
    verbs:
      - get
      - list

  # Service discovery
  - apiGroups: [""]
    resources:
      - services
      - endpoints
    verbs:
      - get
      - list

  # ConfigMaps/Secrets: Currently disabled
  # Uncomment ConfigMaps if needed (NEVER enable Secrets)
  # - apiGroups: [""]
  #   resources:
  #     - configmaps
  #   verbs:
  #     - get
  #     - list

---
# RoleBinding: Links ServiceAccount to Role
# - Grants mcp-server-sa the permissions defined in mcp-server-readonly
# - Only effective in citrus namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-server-readonly-binding
  namespace: citrus
  labels:
    app: mcp-server
subjects:
  - kind: ServiceAccount
    name: mcp-server-sa
    namespace: citrus
roleRef:
  kind: Role
  name: mcp-server-readonly
  apiGroup: rbac.authorization.k8s.io

# =============================================================================
# Deployment & Verification
# =============================================================================
# Apply:
#   kubectl apply -f infra/rbac/mcp-server-rbac.yaml
#
# Verify permissions:
#   kubectl auth can-i get pods --as=system:serviceaccount:citrus:mcp-server-sa -n citrus
#   # Expected: yes
#
#   kubectl auth can-i delete pods --as=system:serviceaccount:citrus:mcp-server-sa -n citrus
#   # Expected: no
# =============================================================================
