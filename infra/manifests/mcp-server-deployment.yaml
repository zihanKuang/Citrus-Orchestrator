# MCP Server Deployment (RBAC / packaging demo)
# Purpose:
#   Prove least-privilege in-cluster identity (ServiceAccount + Role) and that
#   the container image runs as non-root. This Pod is NOT the transport used by
#   components/agent_cli — the CLI spawns MCP over local stdio with kubeconfig.
#
# Image: python:3.12-slim based (see components/mcp-server/Dockerfile)
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: citrus
  labels:
    app: mcp-server
    component: ai-agent
    version: v3
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: mcp-server

  template:
    metadata:
      labels:
        app: mcp-server
        component: ai-agent
        version: v3
      annotations:
        prometheus.io/scrape: "false"
        seccomp.security.alpha.kubernetes.io/pod: runtime/default

    spec:
      serviceAccountName: mcp-server-sa
      automountServiceAccountToken: true

      containers:
        - name: mcp-server
          # Build: docker build -t mcp-server:v3 ./components/mcp-server
          image: mcp-server:v3
          imagePullPolicy: IfNotPresent

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # Process-level checks (not "file exists")
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - import tools; import sys; sys.exit(0)
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - import tools; import sys; sys.exit(0)
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # In-cluster Prometheus Service (kube-prometheus-stack)
            - name: PROMETHEUS_URL
              value: "http://monitoring-kube-prometheus-prometheus:9090"

          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

      restartPolicy: Always
      dnsPolicy: ClusterFirst

# =============================================================================
# Deploy:
#   kubectl apply -f infra/rbac/mcp-server-rbac.yaml
#   kubectl apply -f infra/manifests/mcp-server-deployment.yaml
#   kubectl apply -f infra/manifests/rbac-test-pod.yaml   # optional 403 demo
#
# Diagnose (local Agent, not this Pod):
#   cd components
#   python -m agent_cli "What happened to frontend?"
# =============================================================================
