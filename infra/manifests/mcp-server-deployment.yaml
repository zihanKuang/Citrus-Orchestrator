# =============================================================================
# MCP Server Deployment
# =============================================================================
# Features:
# - ServiceAccount with RBAC restrictions
# - Distroless container (no shell)
# - Resource limits and health checks
# - Security hardening (readOnlyRootFilesystem, non-root user)
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: citrus
  labels:
    app: mcp-server
    component: ai-agent
    version: v1
spec:
  replicas: 1
  
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  
  selector:
    matchLabels:
      app: mcp-server
  
  template:
    metadata:
      labels:
        app: mcp-server
        component: ai-agent
        version: v1
      annotations:
        prometheus.io/scrape: "false"
        seccomp.security.alpha.kubernetes.io/pod: runtime/default
    
    spec:
      # Security: Use custom ServiceAccount (not default)
      # Token auto-injected at /var/run/secrets/kubernetes.io/serviceaccount/token
      serviceAccountName: mcp-server-sa
      automountServiceAccountToken: true
      
      containers:
        - name: mcp-server
          # Build locally: docker build -t mcp-server:v3 .
          # Load to cluster: kind load docker-image mcp-server:v3
          image: mcp-server:v3
          imagePullPolicy: IfNotPresent
          
          # Resource limits
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          
          # Liveness probe: restart if unhealthy
          livenessProbe:
            exec:
              command:
                - cat
                - /app/server.py
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness probe: mark ready when healthy
          readinessProbe:
            exec:
              command:
                - cat
                - /app/server.py
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Environment variables
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          
          # Security context: container-level hardening
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532  # distroless nonroot user
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      
      # Security context: pod-level settings
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      
      restartPolicy: Always
      dnsPolicy: ClusterFirst

# =============================================================================
# Deployment Commands
# =============================================================================
# 1. Build and load image:
# cd components/mcp-server
# docker build -t mcp-server:v1 .
# kind load docker-image mcp-server:v1  # for kind
#
# 2. Apply RBAC (if not done):
# kubectl apply -f infra/rbac/mcp-server-rbac.yaml
#
# 3. Deploy:
# kubectl apply -f infra/manifests/mcp-server-deployment.yaml
#
# 4. Verify:
# kubectl get pods -n citrus -l app=mcp-server
# kubectl logs -n citrus -l app=mcp-server --tail=50
#
# 5. Test RBAC:
# kubectl cp components/mcp-server/test-rbac.py citrus/<pod>:/tmp/
# kubectl exec -n citrus <pod> -- python3 /tmp/test-rbac.py
# =============================================================================
