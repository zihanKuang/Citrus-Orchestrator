apiVersion: v2
name: citrus-app
description: A high-performance cloud-native orchestration for the Citrus microservices stack.
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: kube-prometheus-stack
    version: "61.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: jaeger
    version: "3.x.x"
    repository: "https://jaegertracing.github.io/helm-charts"
    condition: jaeger.enabled