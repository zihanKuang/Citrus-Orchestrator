{{- range $name, $config := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "citrus-app.labels" $ | nindent 4 }}
spec:
  replicas: {{ $config.replicaCount }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      containers:
      - name: main
        image: "{{ $config.image.repository }}:{{ $config.image.tag }}"
        imagePullPolicy: {{ $config.image.pullPolicy }}
        env:
        - name: PORT
          value: {{ $config.service.targetPort | quote }}

        # 1. Inject service endpoints dynamically from values.yaml (DRY principle)
        {{- range $envName, $envValue := $.Values.config.serviceEndpoints }}
        - name: {{ $envName }}
          value: {{ $envValue | quote }}
        {{- end }}

        - name: DISABLE_PROFILER
          value: "1"

        # 2. Advanced OpenTelemetry Tracing Logic
        {{- if $.Values.tracing.enabled }}
        - name: OTEL_SERVICE_NAME
          value: {{ $name | quote }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ $.Values.tracing.endpoint | quote }}
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: {{ $.Values.tracing.protocol | quote }}
        - name: OTEL_TRACES_SAMPLER
          value: {{ $.Values.tracing.sampler | quote }}
        # Mandatory for modern SDKs to talk to non-TLS internal Jaeger
        - name: OTEL_EXPORTER_OTLP_INSECURE
          value: "true"
        # Mandatory for older Google demo images to activate OTLP
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        {{- else }}
        - name: DISABLE_TRACING
          value: "1"
        {{- end }}

        # 3. Service-specific environment variables
        {{- if eq $name "shoppingassistantservice" }}
        - name: PROJECT_ID
          value: "gen-lang-client-0189893462"
        - name: REGION
          value: "europe-north1"
        - name: ALLOYDB_CLUSTER_NAME
          value: "dummy-cluster"
        - name: ALLOYDB_INSTANCE_NAME
          value: "dummy-instance"
        - name: ALLOYDB_DATABASE_NAME
          value: "dummy-db"
        - name: ALLOYDB_TABLE_NAME
          value: "dummy-table"
        - name: ALLOYDB_SECRET_NAME
          value: "dummy-secret"
        {{- end }}

        {{- if eq $name "loadgenerator" }}
        - name: FRONTEND_ADDR
          value: "frontend:80"
        - name: USERS
          value: "10"
        {{- end }}
        
        ports:
        - containerPort: {{$config.service.targetPort}}
        resources:
          requests:
            cpu: {{ $config.resources.requests.cpu }}
            memory: {{ $config.resources.requests.memory }}
          limits:
            cpu: {{ $config.resources.limits.cpu }}
            memory: {{ $config.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }} 
  labels:
    {{- include "citrus-app.labels" $ | nindent 4 }}
    app: {{ $name }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ $config.service.port }}      
      targetPort: {{ $config.service.targetPort }}                                  
  type: {{ $config.service.type | default "ClusterIP" }}
{{- end }}