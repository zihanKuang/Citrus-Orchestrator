apiVersion: v1
kind: Service
metadata:
  name: recommendation-service 
  labels:
    app: recommendation-service
spec:
  selector:
    app: recommendation-service
  
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.recommendationService.service.port }}      
      targetPort: {{ .Values.recommendationService.service.targetPort }}                                  

  type: ClusterIP