global:
  domain: citrus.local
  environment: production

recommendationService:
  replicaCount: 2
  image:
    repository: zihanKuang/citrus-recommendation
    tag: latest
    pullPolicy: IfNotPresent

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  service:
    port: 80
    targetPort: 8080