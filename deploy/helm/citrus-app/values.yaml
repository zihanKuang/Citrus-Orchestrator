global:
  domain: citrus.local
  environment: production

# Global configuration for internal service discovery
config:
  serviceEndpoints:
    PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
    CURRENCY_SERVICE_ADDR: "currencyservice:7000"
    CART_SERVICE_ADDR: "cartservice:7070"
    RECOMMENDATION_SERVICE_ADDR: "recommendationservice:8080"
    SHIPPING_SERVICE_ADDR: "shippingservice:50051"
    CHECKOUT_SERVICE_ADDR: "checkoutservice:5050"
    AD_SERVICE_ADDR: "adservice:9555"
    PAYMENT_SERVICE_ADDR: "paymentservice:50051"
    EMAIL_SERVICE_ADDR: "emailservice:8080"
    SHOPPING_ASSISTANT_SERVICE_ADDR: "shoppingassistantservice:8080"

# Distributed Tracing (OpenTelemetry) settings
tracing:
  enabled: true
  endpoint: "http://citrus-jaeger-collector:4318"
  protocol: "http/protobuf"
  sampler: "always_on"

services:

  recommendationservice:
    replicaCount: 1
    image: {repository: ghcr.io/zihankuang/citrus-recommendation, tag: latest, pullPolicy: IfNotPresent }
    resources:
      limits: {cpu: 200m, memory: 256Mi}
      requests: { cpu: 100m, memory: 128Mi }
    service: {port: 80, targetPort: 8080 }

  frontend:
    replicaCount: 1
    image: { repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/frontend, tag: v0.10.5, pullPolicy: IfNotPresent }
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 50
    resources:
      limits: { cpu: 200m, memory: 256Mi }
      requests: { cpu: 100m, memory: 128Mi }
    service: { port: 80, targetPort: 8080, type: LoadBalancer }

  adservice:
    replicaCount: 1
    image: { repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/adservice, tag: v0.10.5, pullPolicy: IfNotPresent }
    resources:
      limits: { cpu: 300m, memory: 512Mi }
      requests: { cpu: 100m, memory: 256Mi }
    service: { port: 9555, targetPort: 9555 }

  cartservice:
    replicaCount: 1
    image: { repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/cartservice, tag: v0.10.5, pullPolicy: IfNotPresent }
    resources:
      limits: { cpu: 200m, memory: 256Mi }
      requests: { cpu: 100m, memory: 128Mi }
    service: { port: 7070, targetPort: 7070 }

  checkoutservice:
    replicaCount: 1
    image: { repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/checkoutservice, tag: v0.10.5, pullPolicy: IfNotPresent }
    service: { port: 5050, targetPort: 5050 }
    resources:
      limits: { cpu: 200m, memory: 256Mi }
      requests: { cpu: 100m, memory: 128Mi }

  currencyservice:
    replicaCount: 1
    image: { repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/currencyservice, tag: v0.10.5, pullPolicy: IfNotPresent }
    service: { port: 7000, targetPort: 7000 }
    resources:
      limits: { cpu: 200m, memory: 256Mi }
      requests: { cpu: 100m, memory: 128Mi }

  emailservice:
    replicaCount: 1
    image: { repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/emailservice, tag: v0.10.5, pullPolicy: IfNotPresent }
    service: { port: 8080, targetPort: 8080 }
    resources:
      limits: { cpu: 100m, memory: 128Mi }
      requests: { cpu: 50m, memory: 64Mi }

  paymentservice:
    replicaCount: 1
    image: { repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/paymentservice, tag: v0.10.5, pullPolicy: IfNotPresent }
    service: { port: 50051, targetPort: 50051 }
    resources:
      limits: { cpu: 100m, memory: 128Mi }
      requests: { cpu: 50m, memory: 64Mi}

  productcatalogservice:
    replicaCount: 1
    image: { repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/productcatalogservice, tag: v0.10.5, pullPolicy: IfNotPresent }
    service: { port: 3550, targetPort: 3550 }
    resources:
      limits: { cpu: 200m, memory: 256Mi }
      requests: { cpu: 100m, memory: 128Mi }

  shippingservice:
    replicaCount: 1
    image: { repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/shippingservice, tag: v0.10.5, pullPolicy: IfNotPresent }
    service: { port: 50051, targetPort: 50051 }
    resources:
      limits: { cpu: 200m, memory: 256Mi }
      requests: { cpu: 100m, memory: 128Mi }

  shoppingassistantservice:
    replicaCount: 0
    image: { repository: ghcr.io/zihankuang/citrus-shoppingassistant, tag: latest, pullPolicy: IfNotPresent }
    service: { port: 8080, targetPort: 8080 }
    resources:
      limits: { cpu: 500m, memory: 512Mi }  
      requests: { cpu: 200m, memory: 256Mi }

  loadgenerator:
    replicaCount: 1
    image: { repository: us-central1-docker.pkg.dev/google-samples/microservices-demo/loadgenerator, tag: v0.10.5, pullPolicy: IfNotPresent }
    service: { port: 8080, targetPort: 8080 }
    env:
      - name: FRONTEND_ADDR
        value: "frontend:80"
      - name: USERS
        value: "100"
    resources:
      limits: { cpu: 300m, memory: 512Mi }
      requests: { cpu: 100m, memory: 256Mi }

kube-prometheus-stack:
    # 1. Disable node-exporter (host access is restricted in Autopilot)
    nodeExporter:
      enabled: false
    prometheus-node-exporter:
      enabled: false

    # 2. Disable Alertmanager to avoid unnecessary security policy conflicts
    alertmanager:
      enabled: false

    # 3. Disable monitoring for Google-managed control plane components (restricted access)
    kubeApiServer:
      enabled: false
    kubeLet:
      enabled: true
      serviceMonitor:
        https: true
        insecureSkipVerify: true
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
    coreDns:
      enabled: false

    # 4. Disable webhook patching to comply with GKE Warden security limits
    prometheusOperator:
      tls:
        enabled: false
      admissionWebhooks:
        enabled: false
        patch:
          enabled: false

    # 5. Security hardening: Disable host networking and PID access
    prometheus:
      prometheusSpec:
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
        storageSpec: {}
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorNamespaceSelector: {} 
        
        podMonitorSelectorNilUsesHelmValues: false
        podMonitorNamespaceSelector: {}
        
        ruleSelectorNilUsesHelmValues: false
        ruleNamespaceSelector: {}
      
        hostNetwork: false
        hostPID: false
        securityContext:
          fsGroup: 2000
          runAsGroup: 2000
          runAsNonRoot: true
          runAsUser: 1000

    # 6. Grafana configuration and dashboard sidecar
    grafana:
      enabled: true
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard

jaeger:
    enabled: true
    provisionCassandra: false
    cassandra:
      enabled: false
    schema:
      enabled: false
    allInOne:
      enabled: true
      # Explicit resource definitions to prevent GKE Autopilot from assigning 
      # oversized defaults and to trigger node scale-up in europe-north1-c
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    storage:
      type: memory
    agent: { enabled: false }  # Not required in allInOne mode
    collector: { enabled: false }  # Built-in as part of allInOne
    query: { enabled: false }  # UI and query API are included in allInOne