# OpenTelemetry Demo Configuration
# Purpose: Deploy demo application, integrate with existing monitoring infrastructure

# ========================================
# DISABLE BUILT-IN MONITORING STACK
# We already have Prometheus + Grafana + Jaeger deployed separately
# ========================================

# Disable built-in Jaeger (we use our own)
jaeger:
  enabled: false

# Disable built-in Prometheus (we use our own)
prometheus:
  enabled: false

# Disable built-in Grafana (we use our own)
grafana:
  enabled: false

# ========================================
# OPENTELEMETRY COLLECTOR CONFIGURATION
# Configure OTel Collector to send data to our existing infrastructure
# ========================================

opentelemetry-collector:
  enabled: true
  
  config:
    # Receivers: How services send data to the collector
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    
    # Processors: Transform data before exporting
    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024
      
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
    
    # Exporters: Where to send the data
    exporters:
      # Send traces to our Jaeger
      otlp/jaeger:
        endpoint: jaeger:4317
        tls:
          insecure: true
      
      # Send metrics to our Prometheus
      # Prometheus has OTLP receiver on port 9090
      otlphttp/prometheus:
        endpoint: http://monitoring-kube-prometheus-prometheus:9090/api/v1/otlp
        tls:
          insecure: true
      
      # Debug exporter for troubleshooting
      debug:
        verbosity: basic
    
    # Service: Define pipelines
    service:
      pipelines:
        # Traces pipeline
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/jaeger, debug]
        
        # Metrics pipeline
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/prometheus, debug]
        
        # Logs pipeline (optional, can disable if not needed)
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]

# ========================================
# ALL SERVICES ARE DEFINED UNDER 'components'
# ========================================

components:
  # ========================================
  # FRONTEND PROXY CONFIGURATION
  # The main entry point for the demo
  # ========================================
  
  frontend-proxy:
    enabled: true
    service:
      type: ClusterIP
    env:
      # Point frontend to our Jaeger UI
      - name: JAEGER_HOST
        value: jaeger
      - name: JAEGER_UI_PORT
        value: "16686"
      
      # Point to our Grafana
      - name: GRAFANA_HOST
        value: monitoring-grafana
      - name: GRAFANA_PORT
        value: "80"
  
  # ========================================
  # DEMO SERVICES
  # Enable all core services by default
  # ========================================
  
  # Optional services (disabled by default to save resources)
  fraud-detection:
    enabled: false
  
  image-provider:
    enabled: false
  
  product-reviews:
    enabled: false
  
  # ========================================
  # FEATURE FLAGS SERVICE
  # ========================================
  
  flagd:
    enabled: true
  
  # ========================================
  # DEPENDENCIES (also under 'components')
  # ========================================
  
  # Kafka (for async messaging)
  # Default is 700Mi because Kafka runs JVM with 400MB heap
  kafka:
    enabled: true
    resources:
      limits:
        memory: 700Mi
      requests:
        cpu: 100m
        memory: 400Mi
  
  # Valkey/Redis (for cart storage)
  # Default is 20Mi because it only stores demo cart data
  valkey-cart:
    enabled: true
    resources:
      limits:
        memory: 20Mi
      requests:
        cpu: 50m
        memory: 10Mi
  
  # PostgreSQL (for some services)
  # Default is 100Mi for lightweight demo database
  postgresql:
    enabled: true
    resources:
      limits:
        memory: 100Mi
      requests:
        cpu: 50m
        memory: 50Mi
