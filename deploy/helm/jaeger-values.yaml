# Jaeger Tracing Configuration
# Purpose: Distributed tracing for microservices

# Use All-In-One deployment for simplicity
# Production would use distributed mode with Elasticsearch/Cassandra backend

allInOne:
  enabled: true
  
  # Image configuration
  image:
    tag: "latest"
  
  # Service configuration
  serviceType: ClusterIP  # Internal only, access via port-forward
  
  # Storage: in-memory for development
  # Traces are not persisted across restarts
  args:
    - "--memory.max-traces=10000"
  
  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Disable distributed components (collector, query, agent)
# We're using All-In-One which includes everything
collector:
  enabled: false

query:
  enabled: false

agent:
  enabled: false

# Storage configuration
storage:
  type: memory  # In-memory only - sufficient for demo
  
# Don't provision Cassandra or Elasticsearch
provisionDataStore:
  cassandra: false
  elasticsearch: false
