# 1. Disable node-exporter (host access is restricted in Autopilot)
nodeExporter:
  enabled: false
prometheus-node-exporter:
  enabled: false

# 2. Disable Alertmanager to avoid unnecessary security policy conflicts
alertmanager:
  enabled: false

# 3. Disable monitoring for Google-managed control plane components (restricted access)
kubeApiServer:
  enabled: false
kubeLet:
  enabled: true
  serviceMonitor:
    https: true
    insecureSkipVerify: true
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
coreDns:
  enabled: false

# 4. Disable webhook patching to comply with GKE Warden security limits
prometheusOperator:
  tls:
    enabled: false
  admissionWebhooks:
    enabled: false
    patch:
      enabled: false

# 5. Security hardening: Disable host networking and PID access
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {} 
    
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorNamespaceSelector: {}
    
    ruleSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}
   
    hostNetwork: false
    hostPID: false
    securityContext:
      fsGroup: 2000
      runAsGroup: 2000
      runAsNonRoot: true
      runAsUser: 1000

# 6. Grafana configuration and dashboard sidecar
grafana:
  enabled: true
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard